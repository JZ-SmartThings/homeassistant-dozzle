# Home Assistant App manifest - official docs April 2026:
# https://developers.home-assistant.io/docs/apps/configuration
# Do not use the `advanced` key (deprecated since Supervisor 2026.03.0).
name: "Dozzle"
version: "0.2.1"
slug: "dozzle"
description: "Real-time Docker log viewer (Ingress, optional agent)"
# Project page (support / source of the packaged app for HA)
url: "https://github.com/Erreur32/homeassistant-dozzle"

# Multi-arch image published by GitHub Actions (GHCR), aligned with the repository name.
# For a local build without pulling: remove this line from a copy of the repository.
image: ghcr.io/erreur32/homeassistant-dozzle

map:
  - name: data
    read_only: False
    target: /data

arch:
  - amd64
  - aarch64

startup: services
init: false
boot: auto

# AppArmor profile (dozzle/apparmor.txt) - restricts filesystem and network access
apparmor: true

ingress: true
ingress_port: 8080
ingress_entry: /
ingress_stream: true

panel_title: "Dozzle"
panel_icon: "mdi:docker"

watchdog: "http://[HOST]:[PORT:8080]/"

ports:
  8080/tcp: null
  7007/tcp: null
  8088/tcp: null
ports_description:
  8080/tcp: "Web UI ingress proxy (do not map - use port 8088 for direct access)"
  7007/tcp: "Dozzle agent - map only if the built-in agent is enabled"
  8088/tcp: "Direct web access - map this port when enable_direct_access is true"

docker_api: true
hassio_api: true
auth_api: true
homeassistant_api: false

options:
  log_level: info
  filter: ""
  no_analytics: true
  enable_actions: false
  enable_agent: false
  agent_hostname: ""
  remote_agents: ""
  enable_direct_access: false

schema:
  log_level: list(trace|debug|info|warn|error|fatal)
  filter: str?
  no_analytics: bool
  enable_actions: bool
  enable_agent: bool
  agent_hostname: str?
  remote_agents: str?
  enable_direct_access: bool

# stable: visible in the catalogue without requiring advanced mode (transitioning in Supervisor)
stage: stable
