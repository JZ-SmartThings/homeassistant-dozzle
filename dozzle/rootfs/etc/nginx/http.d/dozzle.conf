server {
    listen 8080;
    server_name _;
    access_log off;

    # ── SSE / streaming (no buffering — Content-Type: text/event-stream) ──────
    # Dozzle streams logs via SSE on /api/events/* paths
    location ~ ^/api/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        add_header         X-Accel-Buffering no;
    }

    # ── All other requests (HTML, assets, SPA) ───────────────────────────────
    # sub_filter patches HTML so the SPA loads correctly through HA Ingress.
    #
    # Problem 1 — absolute asset paths:
    #   Dozzle's compiled SPA emits  src="/assets/main.js"
    #   Browser resolves to          https://HA:8123/assets/main.js  (HA root — 404)
    #   Fix: replace  ="/assets/  →  ="./assets/  (relative to current Ingress URL)
    #
    # Problem 2 — runtime fetch / XHR / WebSocket calls:
    #   The SPA calls  fetch("/api/hosts")  which again goes to HA root, not Ingress.
    #   Fix: inject a tiny JS shim that prefixes all absolute paths with the Ingress
    #   base (/api/hassio_ingress/<token>) detected from window.location.pathname.
    #   Outside Ingress the shim is a no-op (safe to leave in).

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Accept-Encoding "";
        proxy_read_timeout 60s;

        sub_filter_once  off;
        sub_filter_types text/html;

        # Fix 1: absolute asset paths → relative
        sub_filter '="/assets/'  '="./assets/';

        # Fix 2: inject Ingress URL-rewriter shim right before </head>
        sub_filter '</head>' '<script data-ingress-shim>(function(){var m=window.location.pathname.match(/^\/api\/hassio_ingress\/[^\/]+/);if(!m)return;var B=m[0];function fix(u){return(typeof u==="string"&&u.charAt(0)==="/"&&!u.startsWith(B))?B+u:u;}var _f=window.fetch;window.fetch=function(u,o){return _f.call(this,fix(u),o);};var _xo=XMLHttpRequest.prototype.open;XMLHttpRequest.prototype.open=function(){var a=[].slice.call(arguments);a[1]=fix(a[1]);return _xo.apply(this,a);};var _W=window.WebSocket;window.WebSocket=function(u,p){u=fix(u);return p!==void 0?new _W(u,p):new _W(u);};window.WebSocket.prototype=_W.prototype;window.WebSocket.CONNECTING=_W.CONNECTING;window.WebSocket.OPEN=_W.OPEN;window.WebSocket.CLOSING=_W.CLOSING;window.WebSocket.CLOSED=_W.CLOSED;var _ps=history.pushState;var _rs=history.replaceState;history.pushState=function(s,t,u){return _ps.call(this,s,t,fix(u));};history.replaceState=function(s,t,u){return _rs.call(this,s,t,fix(u));};})();</script></head>';
    }
}
