user root;
worker_processes 1;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;
    include /etc/nginx/http.d/*.conf;
}
